services:
  redis:
    image: redis:7-alpine
    container_name: lab08-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  database:
    image: mysql:5.7
    container_name: lab08-db-v2
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flashsale_db
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    volumes:
      - db_data_v2:/var/lib/mysql
    restart: unless-stopped

volumes:
  redis_data:
  db_data_v2:
